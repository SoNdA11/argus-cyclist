<div id="eventHubPage" class="home-overlay hidden" style="z-index: 10000;">
        <div class="home-container" style="margin-top: 6vh; width: 100%; max-width: 1200px; padding: 0 20px;">

            <div style="position: relative; width: 100%; text-align: center; margin-bottom: 40px;">
                <div class="challenge-hub-kicker"
                    style="font-size: 0.85rem; margin-bottom: 8px; color: var(--power-color); font-weight: 700; letter-spacing: 3px; text-transform: uppercase;">
                    E-Sports Simulator</div>
                <h2 style="font-size: 2.8rem; color: #fff; margin: 0; font-weight: 800; letter-spacing: -0.5px;">Choose
                    your event</h2>
                <button class="btn-icon-small" id="btnCloseEventHub" title="Close Event Mode"
                    style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border:none; width: 36px; height: 36px; border-radius: 18px; color: #fff; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);">✕</button>
            </div>

            <div
                style="display: flex; gap: 30px; background: rgba(20, 20, 30, 0.45); border: 1px solid rgba(255,255,255,0.08); padding: 24px 32px; border-radius: 24px; margin-bottom: 40px; align-items: center; justify-content: space-between; flex-wrap: wrap; backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%); box-shadow: 0 20px 40px rgba(0,0,0,0.3);">

                <div style="display: flex; align-items: center; gap: 20px; flex: 1; min-width: 320px;">
                    <div id="dynamicAvatar"
                        style="width: 64px; height: 64px; border-radius: 50%; background: #38bdf8; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; color: #fff; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); transition: all 0.3s ease; flex-shrink: 0;">
                        ?</div>
                    <div class="input-group" style="margin: 0; width: 100%;">
                        <label
                            style="color: rgba(255,255,255,0.5); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Cyclist
                            Name & Category</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="eventRiderName" class="home-input" placeholder="Type your name..."
                                autocomplete="off"
                                style="margin: 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); font-size: 1.2rem; padding: 12px 16px; border-radius: 12px; font-weight: 500; flex: 1;">
                            <select id="eventRiderGender" class="home-input"
                                style="margin: 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); font-size: 1rem; padding: 0 12px; border-radius: 12px; font-weight: 600; color: #fff; width: 85px; cursor: pointer;">
                                <option value="G">All</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="width: 1px; height: 60px; background: rgba(255,255,255,0.1); display: block;"
                    class="hide-mobile"></div>

                <div
                    style="flex: 1.5; display: flex; align-items: center; justify-content: space-between; min-width: 320px; gap: 15px; flex-wrap: wrap;">
                    <div style="flex-grow: 1; min-width: 150px;">
                        <div
                            style="color: rgba(255,255,255,0.5); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600;">
                            Smart Equipment</div>
                        <div id="eventTrainerStatus" class="status-indicator"
                            style="font-weight: 800; font-size: 1.1rem; transition: color 0.3s;">Disconnected</div>
                        <select id="eventTrainerList" class="hidden home-input"
                            style="width: 100%; margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px;"></select>
                    </div>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;">
                        <button id="btnEventScanTrainer" class="btn-secondary" title="Scan Hardware"
                            style="padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #e2e8f0; transition: all 0.25s ease;">🔍
                            Scan</button>
                        <button id="btnEventConnectVirtual" class="btn-secondary" title="Use Simulator"
                            style="padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; background: rgba(0, 173, 216, 0.1); border: 1px solid rgba(0, 173, 216, 0.4); color: #00ADD8; transition: all 0.25s ease;">💻
                            Simulator</button>
                        <button id="btnEventConnectTrainer" class="btn-primary hidden"
                            style="padding: 10px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.5); color: #22c55e; transition: all 0.25s ease;">⚡ Connect</button>
                        <button id="btnEventDisconnectTrainer" class="btn-danger hidden"
                            style="padding: 10px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444; transition: all 0.25s ease;">✕ Disconnect</button>
                    </div>
                </div>
            </div>

            <div class="challenge-card-grid" style="max-width: 100%; gap: 30px;">

                <button class="challenge-card challenge-sprint-card" id="btnLaunchSprint">
                    <span class="challenge-card-mode">Sprint Mode</span>
                    <strong>Max Power Test</strong>
                    <span>15-second explosive blast. Generate maximum wattage and dominate the leaderboard.</span>
                    <div class="card-cta">CLICK TO LAUNCH</div>
                </button>

                <button class="challenge-card challenge-kom-card" id="btnLaunchKOM">
                    <span class="challenge-card-mode">Climb Mode</span>
                    <strong>King of the Mountain</strong>
                    <span>1-minute fixed climb. Smart resistance driven by a dynamic virtual segment.</span>
                    <div class="card-cta">CLICK TO LAUNCH</div>
                </button>

                <div class="challenge-card challenge-tt-card" style="cursor: default;">
                    <span class="challenge-card-mode">Endurance Mode</span>
                    <strong>Precision Pacing</strong>
                    <span>Hold target power as closely as possible for 60s. Bank points based on pacing accuracy.</span>

                    <div
                        style="margin-top: auto; display: flex; gap: 12px; align-items: center; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); width: 100%; position: relative; z-index: 10;">
                        <div style="text-align: left; flex: 1;">
                            <label for="eventTargetPower"
                                style="font-size: 0.7rem; color: #aaa; display: block; margin-bottom: 2px; font-weight: 700; text-transform: uppercase;">Target
                                (W)</label>
                            <input type="number" id="eventTargetPower" value="250" min="100" step="5"
                                style="width: 100%; border: none; background: transparent; color: #fff; font-size: 1.5rem; font-weight: 800; font-family: monospace; outline: none; padding: 0;">
                        </div>
                        <button id="btnLaunchTimeTrial" class="btn-primary"
                            style="padding: 14px 24px; border-radius: 12px; font-weight: 800; letter-spacing: 1px; background: #22c55e; color: #000; border: none; cursor: pointer; transition: transform 0.2s;">START</button>
                    </div>
                </div>

            </div>

            <div style="margin-top: 50px; display: flex; justify-content: center;">
                <button id="btnEventLeaderboard"
                    style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 14px 32px; border-radius: 99px; font-weight: 600; letter-spacing: 0.5px; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; align-items: center; gap: 10px; cursor: pointer;"
                    onmouseover="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='scale(1.05)';"
                    onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='scale(1)';">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                        <path d="M4 22h16"></path>
                        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
                        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
                    </svg>
                    View Global Leaderboard
                </button>
            </div>

        </div>
    </div>
