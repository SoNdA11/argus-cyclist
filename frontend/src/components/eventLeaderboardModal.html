<div id="eventLeaderboardModal" class="modal-overlay hidden" style="z-index: 10005;">
        <div class="modal-content challenge-leaderboard-content">
            <div class="challenge-hub-header"
                style="flex-direction: row; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
                <div style="text-align: left;">
                    <div class="challenge-hub-kicker">Global Ranking</div>
                    <h2 style="font-size: 1.8rem; margin: 0;">Event Podium</h2>
                </div>

                <div
                    style="display: flex; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); gap: 5px;">
                    <button class="lb-filter-btn active" data-filter="G"
                        onclick="window.challengeController.setLeaderboardFilter('G')"
                        style="padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 0.85rem; background: rgba(56,189,248,0.2); color: #38bdf8; border: none; cursor: pointer; transition: all 0.2s;">Geral</button>
                    <button class="lb-filter-btn" data-filter="M"
                        onclick="window.challengeController.setLeaderboardFilter('M')"
                        style="padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 0.85rem; background: transparent; color: #aaa; border: none; cursor: pointer; transition: all 0.2s;">Male</button>
                    <button class="lb-filter-btn" data-filter="F"
                        onclick="window.challengeController.setLeaderboardFilter('F')"
                        style="padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 0.85rem; background: transparent; color: #aaa; border: none; cursor: pointer; transition: all 0.2s;">Female</button>
                </div>

                <button class="btn-icon-small" id="btnCloseEventLeaderboard" title="Close"
                    style="width: 40px; height: 40px; border-radius: 20px; background: rgba(255,255,255,0.1); border: none; color: white;">✕</button>
            </div>
            <div id="eventLeaderboardPanels" class="leaderboard-category-grid" style="margin-top: 20px;"></div>
        </div>
    </div>
