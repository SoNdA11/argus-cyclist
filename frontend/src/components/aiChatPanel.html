<div id="aiChatOverlay" class="ai-overlay hidden">
  <div class="ai-overlay-bg"></div>
  <div class="ai-overlay-content">
    <aside class="ai-sidebar">
      <div class="ai-sidebar-header">
        <div class="ai-sidebar-brand">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--argus-primary)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4m0 4a4 4 0 0 1 4 4h-2a2 2 0 0 0-2-2M12 8a4 4 0 0 0-4 4h2a2 2 0 0 1 2-2" />
            <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z" />
            <path d="M9 16h6" />
          </svg>
          <span>AI Coach</span>
        </div>
        <div class="ai-sidebar-actions">
          <span id="aiConnectionStatus" class="ai-status-dot" title="Ollama Connection">●</span>
          <button class="ai-sidebar-close" id="btnCloseAIChat" title="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </div>

      <button class="ai-new-chat" id="btnAINewConversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
        New conversation
      </button>

      <div class="ai-sidebar-section-label">History</div>
      <div class="ai-conv-list" id="aiConversations">
        <div class="ai-conv-empty">No conversations yet</div>
      </div>

      <div class="ai-sidebar-footer">
        <div class="ai-model-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v6l4 2" />
          </svg>
          <span id="aiModelLabel">connecting...</span>
        </div>
      </div>
    </aside>

    <div class="ai-chat-main">
      <div class="ai-messages" id="aiChatMessages">
        <div class="ai-welcome">
          <div class="ai-welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--argus-primary)" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8V4m0 4a4 4 0 0 1 4 4h-2a2 2 0 0 0-2-2M12 8a4 4 0 0 0-4 4h2a2 2 0 0 1 2-2" />
              <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z" />
              <path d="M9 16h6" />
            </svg>
          </div>
          <h2>AI Cycling Coach</h2>
          <p>Your intelligent training partner. Ask about performance,<br>training plans, or cycling science.</p>
          <div class="ai-suggestions">
            <button class="ai-chip" data-prompt="Create a 45-minute endurance workout at 65% FTP">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              Endurance Workout
            </button>
            <button class="ai-chip" data-prompt="Analyze my recent performance and suggest improvements">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
              </svg>
              Analyze Performance
            </button>
            <button class="ai-chip" data-prompt="What is TSS and how should I use it to plan my training?">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              Explain TSS
            </button>
            <button class="ai-chip" data-prompt="Create a VO2max interval workout with 3-minute intervals">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
              </svg>
              VO2max Intervals
            </button>
          </div>
        </div>
      </div>

      <div class="ai-workout-bar hidden" id="aiWorkoutBar">
        <div class="ai-workout-bar-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 16 12 14 15 10 15 8 12 2 12" />
            <path
              d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
          </svg>
        </div>
        <div class="ai-workout-bar-info">
          <span class="ai-workout-bar-label">Workout generated</span>
          <span class="ai-workout-bar-name" id="aiWorkoutName">Power Endurance Session</span>
        </div>
        <button class="ai-workout-save-btn" id="btnAISaveWorkout">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Save as ZWO
        </button>
      </div>

      <div class="ai-input-area">
        <div class="ai-input-wrapper">
          <textarea id="aiChatInput" placeholder="Ask your AI Coach anything about your training..."
            rows="1"></textarea>
          <button id="btnAISend" class="ai-send-btn" title="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
